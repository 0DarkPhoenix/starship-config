    only_attached     =true
    style             ="fg:color_git"
    symbol            ="´Éİ"
    truncation_length =25
    truncation_symbol ="..."

[git_commit]
    commit_hash_length=7
    disabled          =false
    format            ="( [($tag)(@$hash)]($style) )"
    only_detached     =true
    style             ="fg:color_git"
    tag_disabled      =false
    tag_symbol        ="¾░ô╝ "

[git_status]
    ahead            ="Ôåæ${count} Ôåô0 "
    behind           ="Ôåæ0 Ôåô${count} "
    conflicted       ="=${count}"
    deleted          ="├ù${count}"
    disabled         =false
    diverged         ="Ôåæ${ahead_count} Ôåô${behind_count} "
    format           ='([$ahead_behind]($style) )([$all_status]($style) )'
    ignore_submodules=false
    modified         ="!${count}"
    renamed          ="┬╗${count}"
    staged           ="+${count}"
    stashed          ="*${count}"
    style            ="fg:color_git"
    untracked        ="?${count}"
    up_to_date       =""

