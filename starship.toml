    disabled             =false
    format               ='( [$symbol( $common_meaning)( $signal_name)]($style) )'
    map_symbol           =true
    not_executable_symbol='¾░é¡'
    not_found_symbol     ='¾░ıë'
    pipestatus           =true
    recognize_signal_code=true
    sigint_symbol        ='¾░Éè'
    signal_symbol        ='¾▒Éï'
    style                ='bold fg:color_danger'
    success_symbol       =''
    symbol               ='¾░àÖ'

